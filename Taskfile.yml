version: "3"

vars:
  EMACS: emacs
  EL: projab.el
  TEST_EL: projab-test.el

tasks:
  compile:
    desc: Byte-compile projab.el
    cmds:
      - "{{.EMACS}} --batch -f batch-byte-compile {{.EL}}"
      - rm -f "{{.EL}}c"

  checkdoc:
    desc: Run checkdoc on projab.el
    cmds:
      - "{{.EMACS}} --batch --eval '(checkdoc-file \"{{.EL}}\")'"

  test:
    desc: Run ERT tests
    cmds:
      - "{{.EMACS}} --batch -L . -l {{.TEST_EL}} -f ert-run-tests-batch-and-exit"

  check:
    desc: Run all checks (compile, checkdoc, and tests)
    deps: [compile, checkdoc, test]
